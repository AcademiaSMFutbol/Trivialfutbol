<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fútbol Máster - Anti-Repetición</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --gold: #fbce07; --white: #f8fafc;
            --n1: #22c55e; --n2: #f97316; --n3: #ef4444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: var(--card); width: 95%; max-width: 650px; padding: 2.5rem; border-radius: 2rem; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); }
        .menu-title { font-size: 2.5rem; margin-bottom: 2rem; color: var(--gold); }
        .level-select { display: grid; gap: 15px; }
        .btn-lvl { padding: 20px; border-radius: 15px; border: none; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.3s; color: #000; }
        .bar-container { width: 100%; height: 10px; background: #334155; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--gold); transition: width 0.1s linear; }
        .q-text { font-size: 1.5rem; font-weight: bold; margin-bottom: 2rem; min-height: 5rem; display: flex; align-items: center; justify-content: center; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 480px) { .options { grid-template-columns: 1fr; } }
        button.btn-opt { display: block; width: 100%; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid #475569; color: white; border-radius: 12px; cursor: pointer; font-size: 1.1rem; }
        .correct { background: var(--n1) !important; color: #052e16 !important; font-weight: bold; }
        .wrong { background: var(--n3) !important; }
        #stats { margin-top: 25px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #334155; padding-top: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-loading"><h2>⚽ Cargando mazo de preguntas...</h2></div>

    <div id="screen-start" class="hidden">
        <h1 class="menu-title">FÚTBOL MÁSTER</h1>
        <div class="level-select">
            <button class="btn-lvl" style="background: var(--n1);" onclick="startGame(1)">🌱 CANTERA</button>
            <button class="btn-lvl" style="background: var(--n2);" onclick="startGame(2)">🏆 PROFESIONAL</button>
            <button class="btn-lvl" style="background: var(--n3); color: white;" onclick="startGame(3)">🔥 ÉLITE MUNDIAL</button>
        </div>
        <p id="total-info" style="margin-top:20px; font-size:0.8rem; opacity:0.6;"></p>
    </div>

    <div id="screen-game" class="hidden">
        <div id="lvl-display" style="font-weight: bold; color: var(--gold); letter-spacing: 2px; font-size: 0.8rem;"></div>
        <div class="bar-container"><div id="timer-bar"></div></div>
        <div id="status" style="height: 1.2rem; margin-bottom: 10px; font-size: 0.9rem; font-weight: bold; color: var(--gold);"></div>
        <div class="q-text" id="q-text"></div>
        <div class="options" id="options"></div>
        <div id="stats">
            <span>Goles: <b id="score">0</b> ⚽</span>
            <span id="remaining" style="font-size: 0.8rem; opacity: 0.6;"></span>
            <button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); cursor:pointer; padding:5px 10px; border-radius:5px;">🏠 Salir</button>
        </div>
    </div>
</div>

<script>
    let rawDB = []; 
    let activeDeck = []; 
    let globalUsedHashes = new Set(); // Para asegurar que no se repitan nunca
    let score = 0;
    let timer;
    let currentLvl = 1;

    // 1. CARGA EL JSON (Añadimos un parámetro random para evitar que el navegador use la versión vieja)
    async function init() {
        try {
            const response = await fetch('preguntas.json?v=' + Math.random());
            rawDB = await response.json();
            document.getElementById('screen-loading').classList.add('hidden');
            document.getElementById('screen-start').classList.remove('hidden');
            document.getElementById('total-info').innerText = `Base de datos: ${rawDB.length} preguntas detectadas.`;
        } catch (e) {
            document.getElementById('screen-loading').innerHTML = "<h2 style='color:red'>Error cargando preguntas.json</h2>";
        }
    }

    function startGame(lvl) {
        currentLvl = lvl;
        score = 0;
        // Filtramos y barajamos el mazo al empezar
        activeDeck = rawDB.filter(q => parseInt(q.d) === lvl);
        activeDeck.sort(() => Math.random() - 0.5);
        
        if(activeDeck.length === 0) {
            alert("No hay preguntas para este nivel en el JSON.");
            return;
        }

        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        document.getElementById('lvl-display').innerText = lvl==1 ? "CANTERA" : lvl==2 ? "PROFESIONAL" : "ÉLITE";
        renderQuestion();
    }

    function renderQuestion() {
        // Si el mazo se acaba, avisamos o reiniciamos
        if(activeDeck.length === 0) {
            document.getElementById('q-text').innerText = "¡Has completado todas las preguntas de este nivel!";
            document.getElementById('options').innerHTML = '<button class="btn-lvl" style="background:var(--gold); width:100%" onclick="location.reload()">Volver al Inicio</button>';
            return;
        }

        const data = activeDeck.pop(); // Sacamos la última (imposible repetir en esta sesión)
        
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('remaining').innerText = `Restantes: ${activeDeck.length}`;
        document.getElementById('score').innerText = score;
        
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        data.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'btn-opt';
            b.innerText = opt;
            b.onclick = () => checkAnswer(i, data.c, b, data);
            opts.appendChild(b);
        });

        // Temporizador
        resetTimer(data);
    }

    function resetTimer(data) {
        clearInterval(timer);
        const bar = document.getElementById('timer-bar');
        const status = document.getElementById('status');
        bar.style.width = '100%';
        status.innerText = "⚽ Lee la jugada...";
        
        setTimeout(() => {
            status.innerText = "🔥 ¡DISPARA!";
            let start = Date.now();
            timer = setInterval(() => {
                let diff = Date.now() - start;
                let per = 100 - (diff / 8000 * 100);
                bar.style.width = per + '%';
                if(per <= 0) { clearInterval(timer); checkAnswer(-1, data.c, null, data); }
            }, 50);
        }, 3000);
    }

    function checkAnswer(sel, cor, btn, data) {
        clearInterval(timer);
        const btns = document.querySelectorAll('.btn-opt');
        btns.forEach(b => b.disabled = true);

        if(sel === cor) {
            if(btn) btn.classList.add('correct');
            score++;
        } else {
            if(btn) btn.classList.add('wrong');
            if(btns[cor]) btns[cor].classList.add('correct');
        }
        setTimeout(renderQuestion, 2000);
    }

    init();
</script>
</body>
</html>
