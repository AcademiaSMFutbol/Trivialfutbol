<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial Fútbol - 501 preguntas</title>
    <style>
        :root {
            --verde-sm: #2E7D32;
            --verde-oscuro: #1b5e20;
            --dorado: #FFD700;
            --rojo-error: #d32f2f;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.2s;
        }

        /* Efecto Flash de Error */
        body.error-flash { background-color: var(--rojo-error) !important; }

        .pantalla { display: none; flex-direction: column; align-items: center; padding: 20px; flex: 1; animation: fadeIn 0.4s; }
        .activa { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { color: var(--verde-sm); font-size: 2.8rem; margin: 15px 0; text-shadow: 1px 1px 3px rgba(0,0,0,0.1); }

        /* Ranking Arcade */
        .ranking-card {
            background: white;
            border-top: 6px solid var(--verde-sm);
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        table { width: 100%; border-collapse: collapse; font-family: 'Courier New', monospace; font-size: 1.3rem; }
        th { font-size: 0.8rem; color: #999; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        td { padding: 10px 5px; border-bottom: 1px solid #f9f9f9; }
        .pos { color: var(--verde-sm); font-weight: bold; }

        /* Botón Principal */
        .btn-play {
            background: var(--verde-sm);
            color: white;
            border: none;
            padding: 20px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--verde-oscuro);
            transition: 0.1s;
        }

        .btn-play:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--verde-oscuro); }

        /* Estructura Juego */
        .score-badge {
            background: var(--verde-sm);
            color: white;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #quiz-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .opcion {
            background: #fdfdfd;
            border: 2px solid #eee;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .opcion:hover { border-color: var(--verde-sm); background: #f1f8f1; transform: scale(1.02); }

        /* Footer Inicio */
        footer {
            background: var(--verde-sm);
            color: white;
            padding: 25px;
            width: 100%;
            margin-top: auto;
            border-top: 4px solid var(--dorado);
            text-align: center;
        }

        footer strong { color: var(--dorado); }
    </style>
</head>
<body>

    <section id="pantalla-inicio" class="pantalla activa">
        <h1>Trivial Fútbol</h1>
        <div class="ranking-card">
            <h3>🏆 RANKING SM FÚTBOL</h3>
            <table>
                <thead><tr><th>POS</th><th>ID</th><th>PTS</th></tr></thead>
                <tbody id="lista-ranking"></tbody>
            </table>
        </div>
        <button class="btn-play" onclick="comenzar()">¡JUGAR!</button>
        <footer>
            <p>Creado por <strong>SM Fútbol 2026</strong></p>
            <p>📧 academiasmfutbol@outlook.es | 📞 625 468 296</p>
        </footer>
    </section>

    <section id="pantalla-juego" class="pantalla">
        <div class="score-badge">PUNTOS: <span id="pts-actual">0</span></div>
        <div id="quiz-box">
            <h2 id="pregunta-txt">...</h2>
            <div id="opciones-grid"></div>
        </div>
    </section>

    <script>
        let db = [];
        let pIndex = 0;
        let score = 0;

        async function cargar() {
            const res = await fetch('preguntas.json');
            const data = await res.json();
            db = data.filter(i => i.q).sort(() => Math.random() - 0.5);
            mostrarRanking();
        }

        function comenzar() {
            score = 0;
            pIndex = 0;
            document.getElementById('pts-actual').innerText = score;
            navegar('pantalla-juego');
            nuevaPregunta();
        }

        function nuevaPregunta() {
            if (pIndex >= db.length) return finalizar("¡ERES UNA LEYENDA!");

            const p = db[pIndex];
            document.getElementById('pregunta-txt').innerText = p.q;
            const grid = document.getElementById('opciones-grid');
            grid.innerHTML = "";

            p.a.forEach((txt, i) => {
                const d = document.createElement('div');
                d.className = 'opcion';
                d.innerText = txt;
                d.onclick = () => {
                    if (i === p.c) {
                        score += 10;
                        document.getElementById('pts-actual').innerText = score;
                        pIndex++;
                        nuevaPregunta();
                    } else {
                        lanzarError();
                    }
                };
                grid.appendChild(d);
            });
        }

        function lanzarError() {
            // Efecto flash rojo
            document.body.classList.add('error-flash');
            setTimeout(() => {
                document.body.classList.remove('error-flash');
                finalizar("¡EXPULSADO! Respuesta incorrecta.");
            }, 250);
        }

        function finalizar(msj) {
            alert(msj);
            let id = prompt("PUNTOS: " + score + "\nIntroduce tus iniciales (3 letras):");
            if (id) {
                let r = JSON.parse(localStorage.getItem('sm_ranking')) || [];
                r.push({ id: id.substring(0, 3).toUpperCase(), score });
                r.sort((a, b) => b.score - a.score);
                localStorage.setItem('sm_ranking', JSON.stringify(r.slice(0, 5)));
            }
            window.location.reload();
        }

        function mostrarRanking() {
            const list = document.getElementById('lista-ranking');
            const r = JSON.parse(localStorage.getItem('sm_ranking')) || [];
            if (r.length === 0) {
                list.innerHTML = "<tr><td colspan='3'>SIN DATOS</td></tr>";
                return;
            }
            list.innerHTML = r.map((j, i) => `
                <tr><td class="pos">${i+1}</td><td>${j.id}</td><td>${j.score}</td></tr>
            `).join('');
        }

        function navegar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }

        window.onload = cargar;
    </script>
</body>
</html>
