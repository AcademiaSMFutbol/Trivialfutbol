<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial Fútbol - 501 preguntas</title>
    <style>
        :root {
            --verde-sm: #2E7D32;
            --verde-oscuro: #1b5e20;
            --dorado: #FFD700;
            --rojo-error: #d32f2f;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.2s;
        }

        body.error-flash { background-color: var(--rojo-error) !important; }

        .pantalla { display: none; flex-direction: column; align-items: center; padding: 20px; flex: 1; animation: fadeIn 0.4s; }
        .activa { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { color: var(--verde-sm); font-size: 2.8rem; margin: 15px 0; }

        /* Timer Bar */
        #timer-container {
            width: 100%;
            max-width: 550px;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--verde-sm);
            transition: width 0.1s linear;
        }

        /* Ranking */
        .ranking-card {
            background: white;
            border-top: 6px solid var(--verde-sm);
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        table { width: 100%; border-collapse: collapse; font-family: 'Courier New', monospace; font-size: 1.3rem; }
        .pos { color: var(--verde-sm); font-weight: bold; }

        /* Botón Jugar */
        .btn-play {
            background: var(--verde-sm);
            color: white;
            border: none;
            padding: 20px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--verde-oscuro);
        }

        /* Quiz Box */
        #quiz-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .opcion {
            background: #fdfdfd;
            border: 2px solid #eee;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .opcion:hover { border-color: var(--verde-sm); background: #f1f8f1; }

        footer {
            background: var(--verde-sm);
            color: white;
            padding: 25px;
            width: 100%;
            margin-top: auto;
            border-top: 4px solid var(--dorado);
            text-align: center;
        }
    </style>
</head>
<body>

    <section id="pantalla-inicio" class="pantalla activa">
        <h1>Trivial Fútbol</h1>
        <div class="ranking-card">
            <h3>🏆 TOP SM FÚTBOL</h3>
            <table>
                <thead><tr><th>POS</th><th>ID</th><th>PTS</th></tr></thead>
                <tbody id="lista-ranking"></tbody>
            </table>
        </div>
        <button class="btn-play" onclick="comenzar()">¡JUGAR!</button>
        <footer>
            <p>Creado por <strong>SM Fútbol 2026</strong></p>
            <p>📧 academiasmfutbol@outlook.es | 📞 625 468 296</p>
        </footer>
    </section>

    <section id="pantalla-juego" class="pantalla">
        <div style="font-weight: bold; margin-bottom: 10px;">PUNTOS: <span id="pts-actual">0</span></div>
        
        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>

        <div id="quiz-box">
            <h2 id="pregunta-txt">Cargando...</h2>
            <div id="opciones-grid"></div>
        </div>
    </section>

    <script>
        let db = [];
        let pIndex = 0;
        let score = 0;
        let tiempoRestante = 10;
        let intervaloTimer;

        async function cargar() {
            const res = await fetch('preguntas.json');
            const data = await res.json();
            db = data.filter(i => i.q).sort(() => Math.random() - 0.5);
            mostrarRanking();
        }

        function comenzar() {
            score = 0;
            pIndex = 0;
            document.getElementById('pts-actual').innerText = score;
            navegar('pantalla-juego');
            nuevaPregunta();
        }

        function nuevaPregunta() {
            clearInterval(intervaloTimer);
            if (pIndex >= db.length) return finalizar("¡ERES UNA LEYENDA!");

            const p = db[pIndex];
            document.getElementById('pregunta-txt').innerText = p.q;
            const grid = document.getElementById('opciones-grid');
            grid.innerHTML = "";

            p.a.forEach((txt, i) => {
                const d = document.createElement('div');
                d.className = 'opcion';
                d.innerText = txt;
                d.onclick = () => {
                    if (i === p.c) {
                        score += 10;
                        document.getElementById('pts-actual').innerText = score;
                        pIndex++;
                        nuevaPregunta();
                    } else {
                        lanzarError("¡EXPULSADO! Respuesta incorrecta.");
                    }
                };
                grid.appendChild(d);
            });

            iniciarTimer();
        }

        function iniciarTimer() {
            tiempoRestante = 10;
            const bar = document.getElementById('timer-bar');
            bar.style.width = "100%";
            bar.style.backgroundColor = "var(--verde-sm)";

            intervaloTimer = setInterval(() => {
                tiempoRestante -= 0.1;
                let porcentaje = (tiempoRestante / 10) * 10;
                bar.style.width = (tiempoRestante * 10) + "%";

                if (tiempoRestante <= 3) bar.style.backgroundColor = "var(--rojo-error)";

                if (tiempoRestante <= 0) {
                    clearInterval(intervaloTimer);
                    lanzarError("¡TIEMPO AGOTADO!");
                }
            }, 100);
        }

        function lanzarError(msj) {
            clearInterval(intervaloTimer);
            document.body.classList.add('error-flash');
            setTimeout(() => {
                document.body.classList.remove('error-flash');
                finalizar(msj);
            }, 300);
        }

        function finalizar(msj) {
            alert(msj);
            let id = prompt("PUNTOS: " + score + "\nIniciales (3 letras):");
            if (id) {
                let r = JSON.parse(localStorage.getItem('sm_ranking')) || [];
                r.push({ id: id.substring(0, 3).toUpperCase(), score });
                r.sort((a, b) => b.score - a.score);
                localStorage.setItem('sm_ranking', JSON.stringify(r.slice(0, 5)));
            }
            window.location.reload();
        }

        function mostrarRanking() {
            const list = document.getElementById('lista-ranking');
            const r = JSON.parse(localStorage.getItem('sm_ranking')) || [];
            list.innerHTML = r.length ? r.map((j, i) => `
                <tr><td class="pos">${i+1}</td><td>${j.id}</td><td>${j.score}</td></tr>
            `).join('') : "<tr><td colspan='3'>SIN RÉCORDS</td></tr>";
        }

        function navegar(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }

        window.onload = cargar;
    </script>
</body>
</html>
