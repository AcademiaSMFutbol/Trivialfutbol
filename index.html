<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial Fútbol - 501 preguntas </title>
    <style>
        :root {
            --verde-institucional: #2E7D32;
            --dorado: #FFD700;
            --gris-claro: #F5F5F5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--gris-claro);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
        }

        .pantalla { display: none; flex-direction: column; align-items: center; padding: 20px; flex: 1; }
        .activa { display: flex; }

        h1 { color: var(--verde-institucional); font-size: 2.8rem; margin-bottom: 10px; }

        /* Estilo Ranking Arcade */
        .ranking-container {
            background: white;
            border: 4px solid var(--verde-institucional);
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .ranking-container h3 { margin-top: 0; color: var(--verde-institucional); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.3rem;
            font-weight: bold;
        }

        th { border-bottom: 3px solid var(--verde-institucional); padding-bottom: 10px; }
        td { padding: 12px 5px; color: #333; }

        /* Botones */
        button {
            background-color: var(--verde-institucional);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #1b5e20;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #1b5e20; background-color: #388e3c; }
        button:active { transform: translateY(2px); box-shadow: none; }

        /* Juego */
        #pregunta-texto { font-size: 1.5rem; margin: 30px 0; min-height: 80px; color: #222; }
        .opcion {
            background: white;
            border: 2px solid #ddd;
            width: 100%;
            max-width: 450px;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .opcion:hover { background-color: #e8f5e9; border-color: var(--verde-institucional); }

        /* Footer SM Fútbol */
        .footer-institucional {
            background: white;
            padding: 25px;
            border-top: 5px solid var(--verde-institucional);
            color: #444;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .footer-institucional strong { color: var(--verde-institucional); }
    </style>
</head>
<body>

    <section id="inicio" class="pantalla activa">
        <h1>Trivial Fútbol</h1>
        
        <div class="ranking-container">
            <h3>🏆 RANKING HISTÓRICO</h3>
            <table>
                <thead>
                    <tr>
                        <th>POS</th>
                        <th>ID</th>
                        <th>PTS</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    </tbody>
            </table>
        </div>

        <button onclick="iniciar()">JUGAR AHORA</button>

        <footer class="footer-institucional">
            <p>Creado por <strong>SM Fútbol</strong></p>
            <p>📧 academiasmfutbol@outlook.es | 📞 625 468 296</p>
        </footer>
    </section>

    <section id="juego" class="pantalla">
        <div style="font-size: 1.2rem; font-weight: bold; color: var(--verde-institucional);">
            Marcador: <span id="puntos">0</span>
        </div>
        <h2 id="pregunta-texto">Calentando...</h2>
        <div id="opciones-box"></div>
    </section>

    <script>
        let preguntas = [];
        let pActual = 0;
        let score = 0;

        // Carga de Datos
        async function cargar() {
            try {
                const res = await fetch('preguntas.json');
                const data = await res.json();
                // Filtramos solo las que tienen pregunta "q"
                preguntas = data.filter(item => item.q).sort(() => Math.random() - 0.5);
                verRanking();
            } catch (e) { console.error("Error cargando preguntas"); }
        }

        function iniciar() {
            score = 0;
            pActual = 0;
            document.getElementById('puntos').innerText = score;
            cambiarPantalla('juego');
            renderPregunta();
        }

        function renderPregunta() {
            if (pActual >= preguntas.length) {
                finalizar();
                return;
            }

            const data = preguntas[pActual];
            document.getElementById('pregunta-texto').innerText = data.q;
            const box = document.getElementById('opciones-box');
            box.innerHTML = "";

            data.a.forEach((opc, i) => {
                const div = document.createElement('div');
                div.className = 'opcion';
                div.innerText = opc;
                div.onclick = () => {
                    if (i === data.c) score += 10;
                    document.getElementById('puntos').innerText = score;
                    pActual++;
                    renderPregunta();
                };
                box.appendChild(div);
            });
        }

        function finalizar() {
            let nick = prompt("¡FIN DEL JUEGO!\nPuntos totales: " + score + "\nIngresa tus iniciales (3 letras):");
            if (nick) {
                nick = nick.substring(0, 3).toUpperCase();
                salvar(nick, score);
            }
            location.reload();
        }

        // Lógica de Ranking
        function salvar(id, pts) {
            let r = JSON.parse(localStorage.getItem('sm_rank')) || [];
            r.push({ id, pts });
            r.sort((a, b) => b.pts - a.pts);
            localStorage.setItem('sm_rank', JSON.stringify(r.slice(0, 5)));
        }

        function verRanking() {
            const body = document.getElementById('tabla-body');
            const r = JSON.parse(localStorage.getItem('sm_rank')) || [];
            if (r.length === 0) {
                body.innerHTML = "<tr><td colspan='3'>SIN RÉCORDS</td></tr>";
                return;
            }
            body.innerHTML = r.map((jugador, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${jugador.id}</td>
                    <td>${jugador.pts}</td>
                </tr>
            `).join('');
        }

        function cambiarPantalla(id) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
        }

        window.onload = cargar;
    </script>
</body>
</html>
