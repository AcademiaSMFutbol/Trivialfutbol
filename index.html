<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Fútbol Pro 100</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --gold: #fbce07; --white: #f8fafc;
            --n1: #22c55e; --n2: #f97316; --n3: #ef4444;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--white); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: var(--card); width: 90%; max-width: 600px; padding: 2rem; border-radius: 1rem; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;}
        
        .bar-container { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--gold); transition: width 0.1s linear; }
        
        #lvl-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background: var(--gold); color: #000; text-transform: uppercase; margin-bottom: 10px;}
        .q-text { font-size: 1.5rem; font-weight: bold; margin-bottom: 2rem; min-height: 4.5rem; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 480px) { .options { grid-template-columns: 1fr; } }
        
        button.btn { display: block; width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid #475569; color: white; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        button.btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: var(--gold); transform: translateY(-2px); }
        button.btn:disabled { opacity: 0.6; cursor: not-serif; }
        
        .correct { background: var(--n1) !important; color: #052e16 !important; font-weight: bold; border-color: var(--n1) !important;}
        .wrong { background: var(--n3) !important; border-color: var(--n3) !important; }
        
        .hidden { display: none; }
        #stats { margin-top: 20px; font-size: 0.9rem; opacity: 0.7; display: flex; justify-content: space-between; border-top: 1px solid #334155; padding-top: 10px;}
    </style>
</head>
<body>

<div id="game-container">
    <div id="setup">
        <h1>Trivia Fútbol Máster</h1>
        <p>Cargando base de datos de 100 preguntas...</p>
    </div>

    <div id="quiz" class="hidden">
        <span id="lvl-tag">NIVEL 1</span>
        <div class="bar-container"><div id="timer-bar"></div></div>
        <div id="status" style="color: var(--gold); font-weight: bold; height: 1.2rem; margin-bottom: 10px;"></div>
        <div class="q-text" id="q-text"></div>
        <div class="options" id="options"></div>
        <div id="stats">
            <span>Partido: <b id="q-count">0</b>/♾️</span>
            <span>Goles: <b id="score">0</b> ⚽</span>
        </div>
    </div>

    <div id="end" class="hidden">
        <h1>Fin del Partido</h1>
        <p id="final-stats"></p>
        <button class="btn" onclick="location.reload()">Jugar de nuevo</button>
    </div>
</div>

<script>
    let allQuestions = []; // La base de datos completa de 100
    let usedQuestions = []; // Preguntas ya mostradas
    let currentIdx = 0;
    let score = 0;
    let timer;
    let difficulty = 1;

    const READ_MS = 3000; // 3s para leer
    const ACTION_MS = 8000; // 8s para responder

    // 1. CARGAR PREGUNTAS DESDE EL JSON EXTERNO
    async function loadDB() {
        try {
            const response = await fetch('preguntas.json');
            allQuestions = await response.json();
            
            if (allQuestions.length < 100) {
                console.warn("La base de datos tiene menos de 100 preguntas.");
            }
            startQuiz();
        } catch (e) {
            document.querySelector('#setup p').innerText = "Error: Asegúrate de tener el archivo preguntas.json en la misma carpeta.";
            console.error(e);
        }
    }

    function startQuiz() {
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        usedQuestions = [];
        showQuestion();
    }

    function showQuestion() {
        // Filtrar preguntas por dificultad actual
        let pool = allQuestions.filter(q => q.d === difficulty);
        
        // Si no quedan preguntas de este nivel, resetear y usar todas las de ese nivel
        if (pool.length === 0) {
            console.warn(`Se acabaron las preguntas del nivel ${difficulty}. Reseteando nivel.`);
            // Opcional: Podrías subir la dificultad automáticamente o ciclar
            difficulty = 1; // Volver a empezar
            pool = allQuestions.filter(q => q.d === 1);
        }

        // Elegir una pregunta aleatoria de este nivel que no se haya usado
        let availablePool = pool.filter(q => !usedQuestions.includes(q));
        
        // Si se usaron todas, resetear las preguntas usadas para ese nivel
        if (availablePool.length === 0) {
            console.log(`Reseteando preguntas usadas del nivel ${difficulty}.`);
            availablePool = pool;
            // Limpiar las preguntas de este nivel de la lista de usadas
            usedQuestions = usedQuestions.filter(q => q.d !== difficulty);
        }

        const data = availablePool[Math.floor(Math.random() * availablePool.length)];
        usedQuestions.push(data);
        currentIdx++; // Contador infinito

        document.getElementById('q-text').innerText = data.q;
        const tag = document.getElementById('lvl-tag');
        tag.innerText = data.d === 1 ? "Cantera" : data.d === 2 ? "Profesional" : "Élite Mundial";
        tag.style.background = data.d === 1 ? "var(--n1)" : data.d === 2 ? "var(--n2)" : "var(--n3)";
        tag.style.color = data.d === 3 ? "white" : "black";
        
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        data.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = opt;
            b.onclick = () => check(i, data.c, b);
            opts.appendChild(b);
        });

        // Configuración de Tiempos con Pausa
        const bar = document.getElementById('timer-bar');
        const status = document.getElementById('status');
        bar.style.width = '100%';
        bar.style.background = '#475569';
        status.innerText = "⚽ Analizando jugada... (Lee)";

        setTimeout(() => {
            // Verificar que seguimos en la misma pregunta (para evitar saltos)
            if (usedQuestions[usedQuestions.length - 1] === data) {
                status.innerText = "🔥 ¡DECIDE RÁPIDO!";
                bar.style.background = "var(--gold)";
                startCountdown();
            }
        }, READ_MS);
    }

    function startCountdown() {
        let startTime = Date.now();
        
        timer = setInterval(() => {
            let elapsed = Date.now() - startTime;
            let percentage = 100 - (elapsed / ACTION_MS * 100);
            document.getElementById('timer-bar').style.width = percentage + '%';
            
            if (percentage <= 0) {
                clearInterval(timer);
                check(-1, usedQuestions[usedQuestions.length-1].c, null);
            }
        }, 50);
    }

    function check(selected, correct, btn) {
        clearInterval(timer);
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add('correct');
            score++;
            // Subir dificultad cada 5 aciertos
            if (score % 5 === 0 && difficulty < 3) difficulty++;
        } else if (btn) {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
        } else {
             // Tiempo agotado
             btns[correct].classList.add('correct');
             document.getElementById('status').innerText = "⚠️ ¡TIEMPO AGOTADO!";
        }

        document.getElementById('score').innerText = score;
        document.getElementById('q-count').innerText = currentIdx;
        setTimeout(showQuestion, 1500);
    }

    // El juego ya no para, así que endGame() no se llama automáticamente.
    // Podrías añadir un botón de "Finalizar Partido" que llame a endGame().
    function endGame() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('end').classList.remove('hidden');
        document.getElementById('final-stats').innerText = `Has marcado ${score} goles.`;
    }

    loadDB();
</script>
</body>
</html>
